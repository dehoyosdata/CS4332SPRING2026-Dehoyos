# All configuration is loaded from .env. Copy .env.example to .env and adjust.
# Run: docker compose --profile postgres up (or mysql)

services:
  dal:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    profiles:
      - postgres
      - mysql

  db_postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-cs4332}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cs4332pass}
      POSTGRES_DB: ${DB_NAME:-cs4332}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles:
      - postgres

  db_mysql:
    image: mysql:8
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-cs4332}
      MYSQL_USER: ${DB_USER:-cs4332}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cs4332pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    profiles:
      - mysql

volumes:
  postgres_data:
  mysql_data:
