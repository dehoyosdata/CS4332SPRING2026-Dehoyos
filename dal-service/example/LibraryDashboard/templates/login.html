{% extends "base.html" %}
{% block title %}Login — Library Dashboard{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-100">
      <h1 class="text-2xl font-bold text-slate-800 mb-2">Library Dashboard</h1>
      <p class="text-slate-500 mb-6">Sign in with your email (user must exist in DAL)</p>
      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-amber-50 text-amber-800 text-sm">{{ error }}</div>
      {% endif %}
      <form method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="email" value="{{ email or '' }}" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
            placeholder="you@example.com">
        </div>
        <button type="submit"
          class="w-full py-2.5 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700 transition">
          Sign in
        </button>
      </form>
      <p class="mt-6 text-center text-slate-400 text-xs">
        Uses GET /users/by-email. Create user via POST /users if needed.
      </p>
    </div>
  </div>
</div>
{% endblock %}
